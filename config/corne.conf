# Corne RGB underglow (WS2812/SK6812-style addressable strip)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# --- OLED: zmk-nice-oled (custom status screen; stock ZMK has no Bongo Cat) ---
# https://github.com/mctechnology17/zmk-nice-oled — composite shield adds `nice_oled`.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Bongo Cat reacts to typing (WPM). Luna is the other mascot; keep only Bongo here.
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
