# Corne RGB underglow (WS2812/SK6812-style addressable strip)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# --- OLED (SSD1306 on stock Corne + nice!nano) ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Keeps slow OLED redraws off the main thread (recommended for splits)
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Built-in status widgets (layer + battery + output are on by default)
CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Blank when idle (default on SSD1306; saves power / reduces burn-in)
# CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Flip black/white if readability is poor on your panel
# CONFIG_ZMK_DISPLAY_INVERT=y
